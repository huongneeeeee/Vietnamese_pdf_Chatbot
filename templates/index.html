<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat with Docs (Full Features)</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Liên kết file CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <!-- Sidebar -->
    <div class="sidebar">
        <div class="sidebar-header">
            <h3>Upload Doc</h3>
        </div>
        <div class="sidebar-content">
            <!-- Form Upload -->
            <label for="pdf_docs" style="display:block; margin-bottom:8px; font-weight:600; color:#005A9C;">Chọn file (PDF, Word, Txt):</label>
            <input type="file" name="pdf_docs" id="pdf_docs" multiple accept=".pdf, .docx, .txt">
            
            <button id="upload-button">
                <i class="fas fa-cloud-upload-alt"></i> Submit & Process
            </button>
            
            <div id="upload-spinner" class="spinner" style="display: none;"></div>
            <div id="upload-status"></div>
            
            <h3 class="manage-title">Manage Files</h3>
            <div id="pdf-list">
                <p class="info-text">Chưa có file nào được tải lên.</p>
            </div>
        </div>
    </div>

    <!-- Khung chat chính -->
    <div class="chat-container">
        <div class="chat-header">
            <h3>Chat with Documents</h3>
            <button id="clean-button" title="Xóa toàn bộ dữ liệu và reset">
                <i class="fas fa-trash-alt"></i> Clean
            </button>
        </div>
        
        <div id="chat-messages" class="chat-messages">
            <div class="message-bubble bot">
                Xin chào! Hãy tải tài liệu (PDF, Word, Txt) ở menu bên trái để bắt đầu chat nhé.
            </div>
        </div>

        <!-- Thinking Indicator -->
        <div id="thinking-indicator" style="display: none; padding: 0 25px;">
            <div class="message-bubble bot" style="width: fit-content;">
                <div class="spinner-dots">
                    <div class="dot"></div><div class="dot"></div><div class="dot"></div>
                </div>
            </div>
        </div>

        <div class="chat-input-area">
            <input type="text" id="user-input" placeholder="Nhập câu hỏi về tài liệu..." autocomplete="off">
            <button id="send-button"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <!-- Liên kết file JavaScript -->
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
